name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository files
        run: |
          test -f README.md
          test -f requirements.txt
          test -f WSP_2V4.ipynb
          python -m json.tool WSP_2V4.ipynb > /dev/null
