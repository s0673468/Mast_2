name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate notebook and requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbformat
          python - <<'PY'
          import pathlib

          from nbformat import read, validate
          from pip._internal.req.constructors import install_req_from_line

          notebook = read("WSP_2V4.ipynb", as_version=4)
          validate(notebook)

          for raw_line in pathlib.Path("requirements.txt").read_text().splitlines():
              line = raw_line.strip()
              if line and not line.startswith("#"):
                  install_req_from_line(line)
          PY
